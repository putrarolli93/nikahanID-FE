<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Tropical/monstera-like bush corner -->
  <g transform="scale(1.2)">
    <!-- Base leaf -->
    <path d="M 0 0 C 80 10, 140 60, 160 140 C 120 120, 60 80, 0 0 Z" fill="#435e4d" />
    <path d="M 0 0 C 30 80, 70 140, 140 180 C 100 120, 50 60, 0 0 Z" fill="#587e64" />
    <path d="M 0 0 C 100 30, 160 90, 180 160 C 140 100, 70 50, 0 0 Z" fill="#749c81" opacity="0.9"/>
    <!-- Small offshoots -->
    <path d="M 0 0 Q 150 10 180 80 Q 120 40 0 0 Z" fill="#3a5243"/>
    <path d="M 0 0 Q 10 150 80 180 Q 40 120 0 0 Z" fill="#88b296"/>
  </g>
</svg>
